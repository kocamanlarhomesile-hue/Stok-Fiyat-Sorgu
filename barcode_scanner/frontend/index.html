<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Barkod Tarayıcı</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #000; color: #fff; }

    #wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: #000;
      display: none;
    }
    #reader {
      width: 100%;
      min-height: 320px;
    }
    #reader video,
    #reader canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    #scan-line {
      position: absolute;
      left: 8%; width: 84%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff3333, transparent);
      box-shadow: 0 0 6px #ff3333;
      animation: scan 2s linear infinite;
      top: 40%;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: 20%; }
      50%  { top: 75%; }
      100% { top: 20%; }
    }

    #frame-guide {
      position: absolute;
      left: 8%; top: 12%;
      width: 84%; height: 76%;
      pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: rgba(255,255,255,0.9);
      border-style: solid;
      border-width: 0;
    }
    .tl { top:0; left:0;  border-top-width:3px; border-left-width:3px; }
    .tr { top:0; right:0; border-top-width:3px; border-right-width:3px; }
    .bl { bottom:0; left:0; border-bottom-width:3px; border-left-width:3px; }
    .br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; }

    #status-bar {
      background: rgba(0,0,0,0.8);
      color: #eee;
      text-align: center;
      padding: 8px 12px;
      font-size: 13px;
      display: none;
    }

    #result-panel {
      display: none;
      background: #1b5e20;
      color: #fff;
      padding: 16px 12px;
      text-align: center;
    }
    #result-panel .label { font-size: 11px; opacity: 0.8; letter-spacing:1px; }
    #result-panel .val   { font-size: 20px; font-weight: bold; margin-top: 4px; word-break: break-all; }

    #btn-row {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #111;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
    }
    #btn-torch  { background: #333; color: #fff; display: none; }
    #btn-rescan { background: #1565c0; color: #fff; display: none; }
    #btn-start  { background: #2e7d32; color: #fff; flex: 1; }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="reader"></div>
  <div id="scan-line"></div>
  <div id="frame-guide">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
</div>

<div id="status-bar">📷 Barkodu çerçeve içine alın...</div>
<div id="result-panel">
  <div class="label">OKUNAN BARKOD</div>
  <div class="val" id="barcode-val">—</div>
</div>

<div id="btn-row">
  <button id="btn-start"  onclick="startScanner()">📷 Kamerayı Başlat</button>
  <button id="btn-torch"  onclick="toggleTorch()">🔦 Flaş</button>
  <button id="btn-rescan" onclick="resetAndScan()">🔄 Tekrar Dene</button>
</div>

<script>
  /* ---- Streamlit protokolü ---- */
  function setHeight(h) {
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setFrameHeight",
      height: h
    }, "*");
  }
  function sendValue(val) {
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setComponentValue",
      value: val,
      dataType: "json"
    }, "*");
  }

  /* ---- Durum ---- */
  let html5QrCode = null;
  let torchOn = false;
  let isScanning = false;
  let isStarting = false;
  let currentMode = "scanning";
  let decodeMissCount = 0;
  let transitionChain = Promise.resolve();

  function withTransition(task) {
    transitionChain = transitionChain.then(task, task);
    return transitionChain;
  }

  function getSupportedFormats() {
    if (typeof Html5QrcodeSupportedFormats === "undefined") {
      return [];
    }

    return [
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
    ];
  }

  function describeError(error) {
    if (!error) {
      return "Bilinmeyen hata";
    }
    if (typeof error === "string") {
      return error;
    }
    if (error.message) {
      return error.message;
    }
    try {
      return JSON.stringify(error);
    } catch (jsonError) {
      return String(error);
    }
  }

  function ensureScannerLibrary() {
    if (typeof Html5Qrcode === "undefined") {
      throw new Error("Kamera tarayıcı kütüphanesi yüklenemedi. Sayfayı yenileyip tekrar deneyin.");
    }
  }

  function updateStatus(message) {
    document.getElementById("status-bar").textContent = message;
  }

  function setScanningLayout() {
    document.getElementById("wrapper").style.display = "block";
    document.getElementById("status-bar").style.display = "block";
    document.getElementById("result-panel").style.display = "none";
    document.getElementById("btn-start").style.display = "none";
    document.getElementById("btn-rescan").style.display = "block";
  }

  function setIdleLayout() {
    document.getElementById("wrapper").style.display = "none";
    document.getElementById("status-bar").style.display = "block";
    document.getElementById("btn-start").style.display = "block";
    document.getElementById("btn-torch").style.display = "none";
    document.getElementById("btn-rescan").style.display = "none";
  }

  function setResultLayout(barcode) {
    document.getElementById("wrapper").style.display = "none";
    document.getElementById("status-bar").style.display = "none";
    document.getElementById("result-panel").style.display = "block";
    document.getElementById("btn-start").style.display = "none";
    document.getElementById("btn-torch").style.display = "none";
    document.getElementById("btn-rescan").style.display = "block";
    document.getElementById("barcode-val").textContent = barcode || "—";
  }

  function pickCamera(cameras) {
    if (!cameras || cameras.length === 0) {
      return null;
    }
    const preferredCamera = cameras.find((camera) => {
      const label = (camera.label || "").toLowerCase();
      return label.includes("back") || label.includes("rear") || label.includes("environment");
    });
    return preferredCamera || cameras[0];
  }

  async function startWithFallbacks(config, preferredCamera) {
    const cameraOptions = [];

    if (preferredCamera && preferredCamera.id) {
      cameraOptions.push({ deviceId: { exact: preferredCamera.id } });
    }

    cameraOptions.push({ facingMode: { ideal: "environment" } });
    cameraOptions.push({ facingMode: "environment" });

    let lastError = null;
    for (const option of cameraOptions) {
      try {
        await html5QrCode.start(
          option,
          config,
          (decodedText) => {
            const barcode = (decodedText || "").trim();
            if (!barcode || !isScanning) {
              return;
            }
            onDetected(barcode);
          },
          () => {
            if (!isScanning) {
              return;
            }
            decodeMissCount += 1;
            if (decodeMissCount % 25 === 0) {
              updateStatus("Yıpranmış barkodlarda telefonu sabitleyin, biraz yaklaşın veya açıyı değiştirin.");
            }
          }
        );
        return;
      } catch (error) {
        lastError = error;
      }
    }

    throw lastError || new Error("Kamera başlatılamadı.");
  }

  function scanBoxSize(viewWidth, viewHeight) {
    return {
      width: Math.floor(viewWidth * 0.92),
      height: Math.max(110, Math.floor(viewHeight * 0.38)),
    };
  }

  async function stopScannerInternal() {
    if (!html5QrCode) {
      isScanning = false;
      isStarting = false;
      return;
    }

    try {
      if (html5QrCode.isScanning) {
        await html5QrCode.stop();
      }
    } catch (error) {
      console.debug("Scanner stop warning:", error);
    }

    try {
      await html5QrCode.clear();
    } catch (error) {
      console.debug("Scanner clear warning:", error);
    }

    isScanning = false;
    isStarting = false;
    torchOn = false;
  }

  async function stopScanner() {
    return withTransition(async () => {
      await stopScannerInternal();
    });
  }

  function updateTorchVisibility() {
    if (!html5QrCode || !html5QrCode.isScanning) {
      document.getElementById("btn-torch").style.display = "none";
      return;
    }

    const capabilities = html5QrCode.getRunningTrackCapabilities ? html5QrCode.getRunningTrackCapabilities() : null;
    const hasTorch = capabilities && capabilities.torch;
    document.getElementById("btn-torch").style.display = hasTorch ? "block" : "none";
    document.getElementById("btn-torch").textContent = torchOn ? "🔦 Kapat" : "🔦 Flaş";
  }

  /* ---- Kamerayı başlat ---- */
  async function startScanner(forceRestart = false) {
    return withTransition(async () => {
      if (isStarting || (isScanning && !forceRestart)) {
        return;
      }

      isStarting = true;
      decodeMissCount = 0;
      torchOn = false;
      setScanningLayout();
      updateStatus("📷 Barkodu çerçeve içine alın. Yıpranmış barkodlarda kamerayı yaklaştırın.");

      try {
        ensureScannerLibrary();
        await stopScannerInternal();

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode("reader", { verbose: false });
        }

        const cameras = await Html5Qrcode.getCameras();
        const preferredCamera = pickCamera(cameras);

        const config = {
          fps: 8,
          qrbox: scanBoxSize,
          aspectRatio: 1,
          disableFlip: false,
          formatsToSupport: getSupportedFormats(),
          experimentalFeatures: {
            useBarCodeDetectorIfSupported: true,
          },
          videoConstraints: {
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            facingMode: { ideal: "environment" },
            advanced: [
              { focusMode: "continuous" },
              { exposureMode: "continuous" },
              { whiteBalanceMode: "continuous" },
            ],
          },
        };

        isScanning = true;
        await startWithFallbacks(config, preferredCamera);
        updateTorchVisibility();
        setTimeout(() => setHeight(document.body.scrollHeight + 10), 400);
      } catch (error) {
        await stopScannerInternal();
        setIdleLayout();
        updateStatus("⚠️ Kamera hatası: " + describeError(error));
        setHeight(document.body.scrollHeight + 10);
      } finally {
        isStarting = false;
      }
    });
  }

  /* ---- Barkod algılandı ---- */
  async function onDetected(barcode) {
    return withTransition(async () => {
      await stopScannerInternal();
      setResultLayout(barcode);
      setTimeout(() => setHeight(document.body.scrollHeight + 10), 100);
      sendValue(barcode);
    });
  }

  /* ---- Tekrar tara ---- */
  async function resetAndScan() {
    sendValue(null);
    document.getElementById("result-panel").style.display = "none";
    await startScanner(true);
  }

  /* ---- Flaş ---- */
  async function toggleTorch() {
    if (!html5QrCode || !html5QrCode.isScanning) {
      return;
    }

    const capabilities = html5QrCode.getRunningTrackCapabilities ? html5QrCode.getRunningTrackCapabilities() : null;
    if (!capabilities || !capabilities.torch) {
      document.getElementById("btn-torch").textContent = "🔦 Desteklenmiyor";
      return;
    }

    try {
      torchOn = !torchOn;
      await html5QrCode.applyVideoConstraints({ advanced: [{ torch: torchOn }] });
      document.getElementById("btn-torch").textContent = torchOn ? "🔦 Kapat" : "🔦 Flaş";
    } catch (error) {
      torchOn = false;
      document.getElementById("btn-torch").textContent = "🔦 Desteklenmiyor";
    }
  }

  /* ---- Streamlit render eventi ---- */
  window.addEventListener("message", e => {
    if (!e.data || e.data.type !== "streamlit:render") return;

    const args = e.data.args || {};
    currentMode = args.mode || "scanning";

    if (currentMode === "scanning" && !isScanning) {
      startScanner();
    } else if (currentMode === "result") {
      stopScanner().then(() => {
        document.getElementById("wrapper").style.display = "none";
        document.getElementById("status-bar").style.display = "none";
        document.getElementById("result-panel").style.display = "none";
        document.getElementById("btn-torch").style.display = "none";
        document.getElementById("btn-rescan").style.display = "block";
        document.getElementById("btn-start").style.display = "none";
        setTimeout(() => setHeight(document.body.scrollHeight + 10), 100);
      });
    }
  });

  /* ---- Hazır sinyali ---- */
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:componentReady",
    apiVersion: 1
  }, "*");

  setHeight(80);
</script>
</body>
</html>
