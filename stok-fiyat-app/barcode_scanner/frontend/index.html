<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Barkod Tarayıcı</title>
  <script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #000; color: #fff; }

    #wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: #000;
    }

    #video {
      width: 100%;
      display: block;
      border-radius: 0;
    }

    /* Kırmızı tarama çizgisi animasyonu */
    #scan-line {
      position: absolute;
      left: 10%;
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff3333, transparent);
      box-shadow: 0 0 6px #ff3333;
      animation: scan 2s linear infinite;
      top: 40%;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: 20%; opacity: 1; }
      50%  { top: 75%; opacity: 1; }
      100% { top: 20%; opacity: 1; }
    }

    /* Köşe çerçeve rehberi */
    #frame-guide {
      position: absolute;
      left: 10%; top: 15%;
      width: 80%; height: 70%;
      pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: #fff;
      border-style: solid;
      border-width: 0;
    }
    .tl { top:0; left:0;  border-top-width:3px; border-left-width:3px; }
    .tr { top:0; right:0; border-top-width:3px; border-right-width:3px; }
    .bl { bottom:0; left:0; border-bottom-width:3px; border-left-width:3px; }
    .br { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; }

    #status-bar {
      background: rgba(0,0,0,0.75);
      color: #fff;
      text-align: center;
      padding: 8px 12px;
      font-size: 13px;
    }

    #result-bar {
      display: none;
      background: #1b5e20;
      color: #fff;
      text-align: center;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
    }

    #btn-row {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #111;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    #btn-torch  { background: #333; color: #fff; }
    #btn-rescan { background: #1565c0; color: #fff; display: none; }
  </style>
</head>
<body>
<div id="wrapper">
  <video id="video" playsinline muted autoplay></video>
  <div id="scan-line"></div>
  <div id="frame-guide">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
</div>

<div id="status-bar">📷 Barkodu çerçeve içine alın...</div>
<div id="result-bar" id="result-bar">✅ <span id="barcode-val"></span></div>

<div id="btn-row">
  <button id="btn-torch" onclick="toggleTorch()">🔦 Flaş</button>
  <button id="btn-rescan" onclick="restartScanner()">🔄 Tekrar Tara</button>
</div>

<script>
  // --- Streamlit iletişim protokolü ---
  function setHeight(h) {
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setFrameHeight",
      height: h
    }, "*");
  }

  function sendValue(val) {
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setComponentValue",
      value: val,
      dataType: "json"
    }, "*");
  }

  // --- Durum ---
  let codeReader = null;
  let torchOn = false;
  let videoTrack = null;
  let scanning = true;

  // --- ZXing yapılandırması (EAN-13 odaklı) ---
  function makeHints() {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    return hints;
  }

  // --- Tarayıcıyı başlat ---
  function startScanner() {
    scanning = true;
    document.getElementById("result-bar").style.display = "none";
    document.getElementById("btn-rescan").style.display = "none";
    document.getElementById("status-bar").textContent = "📷 Barkodu çerçeve içine alın...";
    document.getElementById("scan-line").style.display = "block";

    codeReader = new ZXing.BrowserMultiFormatReader(makeHints(), 200);
    codeReader.timeBetweenDecodingAttempts = 150;

    // Arka kamera + autofocus + yüksek çözünürlük
    const constraints = {
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1280 },
        height: { ideal: 720 },
        focusMode: { ideal: "continuous" },
        advanced: [{ focusMode: "continuous" }]
      }
    };

    navigator.mediaDevices.getUserMedia(constraints)
      .then(stream => {
        const video = document.getElementById("video");
        video.srcObject = stream;
        video.play();

        const tracks = stream.getVideoTracks();
        if (tracks.length > 0) {
          videoTrack = tracks[0];
          // Autofocus etkinleştir
          try {
            videoTrack.applyConstraints({
              advanced: [{ focusMode: "continuous" }]
            });
          } catch(e) {}
        }

        // ZXing ile çözümlemeyi başlat
        codeReader.decodeFromStream(stream, video, (result, err) => {
          if (result && scanning) {
            scanning = false;
            onDetected(result.getText());
          }
        });

        setHeight(document.body.scrollHeight + 10);
      })
      .catch(err => {
        document.getElementById("status-bar").textContent =
          "⚠️ Kamera açılamadı: " + err.message;
        setHeight(document.body.scrollHeight + 10);
      });
  }

  function onDetected(barcode) {
    document.getElementById("scan-line").style.display = "none";
    document.getElementById("result-bar").style.display = "block";
    document.getElementById("barcode-val").textContent = barcode;
    document.getElementById("status-bar").textContent = "✅ Okundu!";
    document.getElementById("btn-rescan").style.display = "block";

    if (codeReader) codeReader.reset();
    if (videoTrack) videoTrack.stop();

    sendValue(barcode);
    setHeight(document.body.scrollHeight + 10);
  }

  function restartScanner() {
    if (codeReader) { try { codeReader.reset(); } catch(e) {} }
    startScanner();
  }

  function toggleTorch() {
    if (!videoTrack) return;
    torchOn = !torchOn;
    try {
      videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
      document.getElementById("btn-torch").textContent =
        torchOn ? "🔦 Flaş Kapat" : "🔦 Flaş";
    } catch(e) {
      document.getElementById("btn-torch").textContent = "🔦 Desteklenmiyor";
    }
  }

  // --- Streamlit handshake ---
  window.addEventListener("message", e => {
    if (e.data && e.data.type === "streamlit:render") startScanner();
  });

  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:componentReady",
    apiVersion: 1
  }, "*");

  setHeight(420);
</script>
</body>
</html>
